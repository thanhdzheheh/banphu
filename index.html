<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dành tặng cho các chị em B4</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@500;700&display=swap');

        body {
            margin: 0; padding: 0;
            background: #050505; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            width: 100vw; height: 100vh;
            position: fixed;
            -webkit-font-smoothing: antialiased; /* Làm mượt font trên webkit */
        }

        #scene-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .card-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); /* Hỗ trợ Safari */
            z-index: 100; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.4s ease;
        }

        .card-modal.show { display: flex; opacity: 1; }

        .card-content {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, #fffaf0 100%);
            padding: 30px; border-radius: 15px;
            width: 85%; max-width: 400px; text-align: center;
            transform: scale(0.8) translateY(30px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.3), inset 0 0 0 1px #ffe4e1;
            max-height: 80vh; /* Chống tràn màn hình dọc đt */
            overflow-y: auto;
        }

        .card-modal.show .card-content {
            transform: scale(1) translateY(0);
        }

        .close-button {
            position: absolute; top: 5px; right: 15px;
            font-size: 40px; cursor: pointer; color: #ffb6c1;
            transition: color 0.3s ease;
            line-height: 1; padding: 5px; /* Dễ chạm hơn trên đt */
        }

        .close-button:hover, .close-button:active { color: #d02090; }

        .card-paper {
            border: 1px solid #ffd1dc;
            padding: 25px 20px;
            background-image: repeating-linear-gradient(transparent, transparent 29px, #ffe4e1 30px);
            background-color: #fdfcf8;
            border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            margin-top: 15px;
        }

        .from-text {
            font-family: 'Dancing Script', cursive; 
            font-size: 38px; 
            color: #c71585; 
            margin: 0 0 10px 0;
            padding-bottom: 5px; 
            font-weight: 700;
        }

        .wish-text {
            font-family: 'Quicksand', sans-serif; 
            font-size: 17px; /* Chỉnh nhỏ 1 xíu cho vừa vặn hơn */
            font-weight: 600; 
            color: #4a4a4a; 
            line-height: 1.6;
            min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="scene-container"></div>

    <div class="card-modal" id="cardModal">
        <div class="card-content">
            <span class="close-button" id="closeButton">&times;</span>
            <div class="card-paper">
                <p class="from-text" id="fromName">From: ...</p>
                <p class="wish-text" id="wishContent">Lời chúc chờ chèn vào...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>

            { name: "Lê Ngọc Đức Anh", message: "Chúc cô giáo và hội chị em lớp ta có một ngày 8/3 ngập tràn nụ cười và những món quà ý nghĩa." },
            { name: "Lê Sỹ Đức Anh", message: "Mùng 8/3 đến rồi, chúc cô mãi trẻ trung, chúc các bạn nữ ngày càng duyên dáng và đáng yêu nhé." },
            { name: "Nguyễn Quang Nguyên Anh", message: "Xin gửi ngàn đóa hoa tươi thắm nhất đến cô và các bạn nữ nhân ngày Quốc tế Phụ nữ." },
            { name: "Triệu Lê Anh", message: "Chúc cô và các bạn nữ mùng 8/3 đi đến đâu cũng tỏa sáng và thu hút mọi ánh nhìn." },

            { name: "Lê Gia Bảo", message: "Nhân ngày 8/3, mong cô và các bạn nữ luôn được mọi người xung quanh trân trọng, yêu thương và chiều chuộng." },
            { name: "Nguyễn Quốc Bảo", message: "Chúc cô giáo và các chị em 8/3 vui vẻ, hãy luôn cười thật nhiều vì nụ cười của phái đẹp là tuyệt nhất!" },
            { name: "Nguyễn Xuân Bắc", message: "8/3 chúc cô và các bạn nữ luôn là những nàng công chúa xinh đẹp trong mắt những người yêu thương mình." },

            { name: "Lê Minh Cường", message: "Mùng 8/3 chúc cô công tác tốt, chúc các bạn nữ lớp mình nhan sắc thăng hạng và điểm số bứt phá!" },

            { name: "Nguyễn Hữu Cường", message: "Chúc cô giáo và các bạn nữ ngày 8/3 lung linh rực rỡ, deadline môn nào cũng mượt mà vượt qua." },

            { name: "Lương Tiến Đạt", message: "8/3 chúc cô luôn dịu dàng với chúng em, chúc các bạn nữ ăn hoài không béo, dáng chuẩn eo thon!" },
            { name: "Nguyễn Xuân Đạt", message: "Chúc cô và các bạn nữ 8/3 có một ngày ngập trong hoa hồng và những điều bất ngờ thú vị." },
            { name: "Ngô Minh Đoàn", message: "Hôm nay 8/3, chúc cô và các bạn nữ được phái mạnh yêu thương, chiều chuộng hết mực." },

            { name: "Mai Phan Hoàng Hải", message: "Mùng 8/3 chúc cô và các chị em đi chơi không lo trời mưa, xinh đẹp bất chấp thời tiết!" },

            { name: "Lê Gia Hưng", message: "8/3 chúc cô và các bạn nữ luôn cảm thấy hạnh phúc và tự hào vì những đặc quyền của phái đẹp!" },
            { name: "Nguyễn Năng Lương", message: "Chúc cô và các bạn nữ ngày 8/3 mở quà mỏi tay, đọc lời chúc mỏi mắt luôn nhé!" },
            { name: "Lê Anh Hùng Mạnh", message: "Nhân ngày Quốc tế Phụ nữ, chúc cô và các bạn nữ đi chơi quên lối về, luôn ngập tràn tiếng cười." },

            { name: "Lê Ngọc Vũ Phong", message: "Nhân ngày 8/3, chúc cô và các bạn nữ mãi giữ được sự dịu dàng nhưng không kém phần cá tính." },
            { name: "Đỗ Viết Phú", message: "8/3 vui vẻ nhé, chúc cô và các bạn nữ luôn là nguồn cảm hứng và động lực tuyệt vời cho phái nam chúng tớ." },
            { name: "Dương Xuân Trọng Thanh", message: "Nhân ngày 8/3, chúc cô và các bạn nữ luôn tự tin, độc lập và thành công với những đam mê của mình." },
            { name: "Lê Đức Tiến", message: "8/3 chúc cô và các bạn nữ thức dậy với nụ cười, đi ngủ với niềm vui trọn vẹn trong tim." },
            { name: "Phan Văn Tuấn", message: "Ngày 8/3, chúc cô và các bạn nữ được tận hưởng những điều tuyệt vời nhất mà thế giới dành tặng phái đẹp." },
            { name: "Hoàng Đình Tùng", message: "Chúc cô và các bạn nữ một ngày 8/3 thật xịn xò, đáng nhớ và ngập tràn tình yêu thương." },
            { name: "Hoàng Đình Tùng", message: "Chúc cô và một nửa thế giới của lớp có một ngày 8/3 ý nghĩa, bung xõa hết mình." },
            { name: "Nguyễn Hoàng Tùng", message: "Thay mặt phái mạnh, xin chúc cô và các bạn nữ 8/3 luôn là những viên ngọc lấp lánh và quý giá nhất!" }
        ];

        let scene, camera, renderer, dotCircle, lettersGroup, letters = [];
        let raycaster, mouse, isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotation = { x: 0, y: 0 };

        const modal = document.getElementById('cardModal');
        const fromName = document.getElementById('fromName');
        const wishContent = document.getElementById('wishContent');
        const closeButton = document.getElementById('closeButton');

        // --- CÁC HÀM VẼ TEXTURE (Không đổi) ---
        function createAddressTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 350;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#f9f6f0'; ctx.fillRect(0, 0, 512, 350);
            
            ctx.strokeStyle = '#e3dac9'; ctx.lineWidth = 2;
            ctx.strokeRect(15, 15, 482, 320);
            ctx.strokeRect(20, 20, 472, 310);

            ctx.fillStyle = '#d02090'; 
            ctx.font = 'bold 35px Georgia';
            ctx.fillText('abc4', 410, 60);

            ctx.fillStyle = '#a09b90';
            ctx.font = 'italic 24px Georgia';
            ctx.fillText('Par Avion', 30, 60);

            ctx.strokeStyle = '#d3c9be'; ctx.lineWidth = 1.5;
            for(let i=0; i<3; i++) {
                ctx.beginPath();
                ctx.moveTo(220, 220 + i*40);
                ctx.lineTo(460, 220 + i*40);
                ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createSealTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 350;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#f4eedf'; ctx.fillRect(0, 0, 512, 350);

            ctx.fillStyle = '#f9f6f0';
            ctx.beginPath(); ctx.moveTo(0, 350); ctx.lineTo(256, 175); ctx.lineTo(512, 350); ctx.fill();
            
            ctx.fillStyle = '#f2ecd9';
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(220, 175); ctx.lineTo(0, 350); ctx.fill();
            ctx.beginPath(); ctx.moveTo(512, 0); ctx.lineTo(292, 175); ctx.lineTo(512, 350); ctx.fill();

            ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
            ctx.fillStyle = '#fcfaf5';
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(256, 190); ctx.lineTo(512, 0); ctx.fill();
            
            ctx.shadowColor = 'transparent';

            const sealX = 256; const sealY = 190;
            
            ctx.fillStyle = '#8b1327';
            ctx.beginPath(); ctx.arc(sealX, sealY, 38, 0, Math.PI * 2); ctx.fill();

            const gradient = ctx.createRadialGradient(sealX - 5, sealY - 5, 2, sealX, sealY, 35);
            gradient.addColorStop(0, '#e63956'); 
            gradient.addColorStop(0.6, '#b31b34');
            gradient.addColorStop(1, '#660d1b'); 
            
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.arc(sealX, sealY, 34, 0, Math.PI * 2); ctx.fill();

            ctx.shadowColor = 'rgba(0,0,0,0.3)'; 
            ctx.shadowBlur = 2; ctx.shadowOffsetY = -1;
            ctx.fillStyle = '#ffd700'; 
            ctx.font = '35px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('❤', sealX, sealY + 2);

            return new THREE.CanvasTexture(canvas);
        }

        function createEdgeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e8dfcc'; ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        function createCoreTextTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 130px "Quicksand", sans-serif';

            ctx.shadowColor = '#ff1493'; 
            ctx.shadowBlur = 30;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            for(let i = 0; i < 4; i++) {
                ctx.fillText('ABC4', 256, 128);
            }

            return new THREE.CanvasTexture(canvas);
        }

        // --- KHỞI TẠO KHÔNG GIAN 3D (TỐI ƯU HIỆU NĂNG) ---
        function init3D() {
            const container = document.getElementById('scene-container');

            scene = new THREE.Scene();
            scene.background = null; 
            scene.fog = new THREE.Fog(0x050505, 15, 60); 

            // Cập nhật Camera Responsive cho điện thoại
            const isMobile = window.innerWidth < 768;
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = isMobile ? 45 : 28; // Tự động lùi camera trên điện thoại

            // Tối ưu Renderer: Giảm Pixel Ratio trên thiết bị siêu nét để cứu GPU
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xfff0f5, 0.8);
            dirLight.position.set(10, 15, 20);
            scene.add(dirLight);

            const backLight = new THREE.DirectionalLight(0xffd1dc, 0.4);
            backLight.position.set(-10, -10, -10);
            scene.add(backLight);

            lettersGroup = new THREE.Group();
            scene.add(lettersGroup);

            // TỐI ƯU HÓA LÕI HẠT (Bỏ depthWrite để xử lý nhẹ hơn gấp 2 lần)
            const dotGeometry = new THREE.BufferGeometry();
            const dotCount = 1500;
            const positions = new Float32Array(dotCount * 3);
            for(let i=0; i < dotCount * 3; i+=3) {
                const radius = 3.5 + Math.random() * 0.5;
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(Math.random() * 2 - 1);
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i+1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i+2] = radius * Math.cos(phi);
            }
            dotGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const dotMaterial = new THREE.PointsMaterial({
                color: 0xff1493, size: 0.15,
                transparent: true, opacity: 0.9, 
                blending: THREE.AdditiveBlending,
                depthWrite: false // QUAN TRỌNG: Tăng hiệu suất cực lớn
            });
            dotCircle = new THREE.Points(dotGeometry, dotMaterial);
            lettersGroup.add(dotCircle);

            const coreTextTexture = createCoreTextTexture();
            const coreTextMaterial = new THREE.SpriteMaterial({ 
                map: coreTextTexture, 
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                depthWrite: false // Tối ưu hiệu năng
            });
            const coreTextSprite = new THREE.Sprite(coreTextMaterial);
            coreTextSprite.scale.set(10, 5, 1); 
            lettersGroup.add(coreTextSprite); 

            // CÁC LÁ THƯ
            const addressTex = createAddressTexture();
            const sealTex = createSealTexture();
            const edgeTex = createEdgeTexture();

            const materials = [
                new THREE.MeshStandardMaterial({ map: edgeTex, roughness: 1 }), 
                new THREE.MeshStandardMaterial({ map: edgeTex, roughness: 1 }), 
                new THREE.MeshStandardMaterial({ map: edgeTex, roughness: 1 }), 
                new THREE.MeshStandardMaterial({ map: edgeTex, roughness: 1 }), 
                new THREE.MeshStandardMaterial({ map: sealTex, roughness: 0.8, metalness: 0.1, bumpMap: sealTex, bumpScale: 0.015 }),
                new THREE.MeshStandardMaterial({ map: addressTex, roughness: 0.8, metalness: 0.1, bumpMap: addressTex, bumpScale: 0.005 })  
            ];

            const letterGeometry = new THREE.BoxGeometry(3.0, 2.0, 0.08); 
            const radiusOrbit = 13; 

            const goldenRatio = (1 + Math.sqrt(5)) / 2;
            const angleIncrement = Math.PI * 2 * goldenRatio;

            for (let i = 0; i < totalLetters; i++) {
                const letter = new THREE.Mesh(letterGeometry, materials);

                const t = i / totalLetters;
                const inclination = Math.acos(1 - 2 * t);
                const azimuth = angleIncrement * i;

                letter.position.x = radiusOrbit * Math.sin(inclination) * Math.cos(azimuth);
                letter.position.y = radiusOrbit * Math.sin(inclination) * Math.sin(azimuth);
                letter.position.z = radiusOrbit * Math.cos(inclination);

                letter.lookAt(0, 0, 0);
                letter.rotateY(Math.PI); 

                letter.userData = { 
                    index: i, 
                    originalPosition: letter.position.clone(),
                    phase: Math.random() * Math.PI * 2 
                };
                
                letters.push(letter);
                lettersGroup.add(letter);
            }

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize, false);
            
            // Xử lý sự kiện Event Listener nhẹ nhàng hơn
            renderer.domElement.addEventListener('mousedown', onMouseDown, {passive: true});
            renderer.domElement.addEventListener('mousemove', onMouseMove, {passive: true});
            window.addEventListener('mouseup', onMouseUp, {passive: true});
            renderer.domElement.addEventListener('click', onClick);

            renderer.domElement.addEventListener('touchstart', onTouchStart, {passive: false});
            renderer.domElement.addEventListener('touchmove', onTouchMove, {passive: false});
            window.addEventListener('touchend', onTouchEnd, {passive: true});
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging) {
                targetRotation.y += 0.0015;
                targetRotation.x += 0.0005;
            }

            lettersGroup.rotation.y += (targetRotation.y - lettersGroup.rotation.y) * 0.05;
            lettersGroup.rotation.x += (targetRotation.x - lettersGroup.rotation.x) * 0.05;
            
            dotCircle.rotation.y -= 0.002;
            dotCircle.rotation.x -= 0.001;
            dotCircle.material.opacity = 0.6 + Math.sin(Date.now() * 0.002) * 0.3; 

            const time = Date.now() * 0.001;
            letters.forEach((letter) => {
                const oPos = letter.userData.originalPosition;
                letter.position.y = oPos.y + Math.sin(time * 1.5 + letter.userData.phase) * 0.3;
                letter.position.x = oPos.x + Math.cos(time * 1.0 + letter.userData.phase) * 0.1;
            });

            renderer.render(scene, camera);
        }

        function onMouseDown(e) { isDragging = true; previousMousePosition = { x: e.offsetX, y: e.offsetY }; }
        function onMouseMove(e) {
            if (isDragging) {
                const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                targetRotation.y += deltaMove.x * 0.008; targetRotation.x += deltaMove.y * 0.008;
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            }
        }
        function onMouseUp() { isDragging = false; }

        let touchStartPos = { x: 0, y: 0 };
        function onTouchStart(e) {
            if(e.touches.length === 1) {
                isDragging = true;
                touchStartPos = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                previousMousePosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            }
        }
        function onTouchMove(e) {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault(); 
                const deltaMove = { x: e.touches[0].pageX - previousMousePosition.x, y: e.touches[0].pageY - previousMousePosition.y };
                targetRotation.y += deltaMove.x * 0.01; targetRotation.x += deltaMove.y * 0.01;
                previousMousePosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            }
        }
        function onTouchEnd(e) {
            isDragging = false;
            if(e.changedTouches.length > 0) {
                const touchEndPos = { x: e.changedTouches[0].pageX, y: e.changedTouches[0].pageY };
                const distance = Math.hypot(touchEndPos.x - touchStartPos.x, touchEndPos.y - touchStartPos.y);
                if(distance < 10) checkIntersection(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        }

        function onClick(e) { if(!isDragging) checkIntersection(e.clientX, e.clientY); }

        function checkIntersection(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(letters);

            if (intersects.length > 0) {
                const intersectedLetter = intersects[0].object;
                const personData = peopleData[intersectedLetter.userData.index];

                fromName.textContent = `From: ${personData.name}`;
                wishContent.textContent = personData.message;
                modal.classList.add('show');
            }
        }

        closeButton.addEventListener('click', () => modal.classList.remove('show'));
        window.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });
        window.addEventListener('touchstart', (e) => { if (e.target === modal) modal.classList.remove('show'); });

        function onWindowResize() {
            const isMobile = window.innerWidth < 768;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.z = isMobile ? 45 : 28; // Tự động chỉnh lại khi xoay dọc/ngang máy
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init3D();
        animate();
    </script>
</body>
